name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      # Two Node LTS lines: cross-version drift (e.g. contentHash / encoding
      # stability, task 009) is directly checkable instead of assumed.
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      # The golden-corpus drift guard (task 007): fails if any golden
      # scenario's expected FlowState differs from live evaluator output.
      # Also part of `pnpm test` — kept as a named step so semantic drift is
      # visible as its own gate.
      - run: pnpm test:golden-drift

      - run: pnpm build
