name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Cross-version drift check (e.g. contentHash / encoding stability,
      # task 009): 24 is our pinned LTS floor (engines >=24) and is required;
      # 26 is the incoming LTS line - non-blocking early warning only.
      matrix:
        node-version: [24, 26]
    continue-on-error: ${{ matrix.node-version == 26 }}
    steps:
      # fetch-depth: 0 so the append-only guard can diff against origin/main.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Reads the pnpm version from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      # Includes @qcms/db's integration tests (task 013), which boot a
      # Testcontainers Postgres per test file. The Docker daemon is available on
      # ubuntu-latest, so no extra service wiring is needed; the harness forces
      # anonymous image pulls (no registry credentials required).
      - run: pnpm test

      # The golden-corpus drift guard (task 007): fails if any golden
      # scenario's expected FlowState differs from live evaluator output.
      # Also part of `pnpm test` - kept as a named step so semantic drift is
      # visible as its own gate.
      - run: pnpm test:golden-drift

      # The A2UI golden corpus is append-only (task 012, ADR-18): fail the build
      # if any committed golden document is modified or deleted vs the default
      # branch. Additions are allowed. Runs on the default branch too (empty diff).
      - run: pnpm check:golden-append-only
        env:
          DEFAULT_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}

      # A NUL byte once shipped in a .ts and passed every gate (workshop retro,
      # Stage 4); this rejects control chars (except tab/LF/CR) in tracked source.
      - run: pnpm check:no-control-chars

      # Runtime dependency licenses must be permissive/MIT-compatible (deny-by-default).
      - run: pnpm check:licenses

      # Em dash (U+2014) is banned in prose/comments/UI strings (AI tell; public repo).
      - run: pnpm check:no-em-dash

      # Copy-paste detection (jscpd, issue #14). Threshold 3% accepts the
      # deliberate vertical-slice repetition (R5); fails on real regression.
      - run: pnpm check:duplication

      - run: pnpm build

  # The 027 consumer-level e2e suite, as its OWN job for signal clarity: when
  # this is red, a product scenario broke (not a unit test). It drives the whole
  # product over HTTP against a Testcontainers Postgres per scenario file (Docker
  # is available on ubuntu-latest; the harness forces anonymous image pulls).
  # Single Node version - the scenarios exercise runtime behaviour, not the
  # cross-version encoding drift the unit matrix guards. The files parallelise
  # (isolated DBs) so the suite stays well under the 5-minute budget.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # @qcms/db's `.` export resolves to dist, so build the workspace first.
      - run: pnpm build

      # The dedicated e2e project (the five scenario files). The OpenAPI drift +
      # validation guard rides in the unit job (part of `pnpm test`), no Docker.
      - run: pnpm --filter qcms-api exec vitest run --root ../.. --project qcms-api-e2e

  # The portal browser suite (the ONE Playwright config, 029/ADR-23), as its own
  # job for signal clarity: when this is red, a respondent-facing surface broke.
  # It boots a Testcontainers Postgres + the composed API in globalSetup and drives
  # the Next.js portal in a real browser. This is where the task 030 accessibility
  # gates ENFORCE: axe (zero violations) on every flow state including post-branch
  # changes, the keyboard-only walkthrough, reduced-motion/200%-zoom, and Lighthouse
  # accessibility = 100 on the entry/flow/error/completion pages. Docker is
  # available on ubuntu-latest (anonymous image pulls, no registry creds).
  portal-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # @qcms/db's `.` export resolves to dist, and globalSetup composes the real
      # API from the built workspace, so build first.
      - run: pnpm build

      # Playwright's Chromium plus the OS libraries headless Chrome needs on the
      # runner. `--with-deps` is what makes both Playwright AND the Lighthouse gate
      # work in CI: the Lighthouse audit launches this same Chromium binary via
      # chrome-launcher (see apps/portal/e2e/a11y-lighthouse.pw.ts), and without the
      # system libraries headless Chrome cannot start on a bare ubuntu runner.
      - run: pnpm exec playwright install --with-deps chromium

      # Runs the whole root Playwright config (CI=true, so it never reuses a server
      # and forbids `test.only`). ~1-2 min including the DB boot and Lighthouse runs.
      - run: pnpm exec playwright test
