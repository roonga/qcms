name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      # The golden-corpus drift guard (task 007): fails if any golden
      # scenario's expected FlowState differs from live evaluator output.
      # Also part of `pnpm test` — kept as a named step so semantic drift is
      # visible as its own gate.
      - run: pnpm test:golden-drift

      - run: pnpm build
