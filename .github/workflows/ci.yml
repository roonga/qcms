name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Cross-version drift check (e.g. contentHash / encoding stability,
      # task 009): 24 is our pinned LTS floor (engines >=24) and is required;
      # 26 is the incoming LTS line — non-blocking early warning only.
      matrix:
        node-version: [24, 26]
    continue-on-error: ${{ matrix.node-version == 26 }}
    steps:
      # fetch-depth: 0 so the append-only guard can diff against origin/main.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Reads the pnpm version from the packageManager field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      # Includes @qcms/db's integration tests (task 013), which boot a
      # Testcontainers Postgres per test file. The Docker daemon is available on
      # ubuntu-latest, so no extra service wiring is needed; the harness forces
      # anonymous image pulls (no registry credentials required).
      - run: pnpm test

      # The golden-corpus drift guard (task 007): fails if any golden
      # scenario's expected FlowState differs from live evaluator output.
      # Also part of `pnpm test` — kept as a named step so semantic drift is
      # visible as its own gate.
      - run: pnpm test:golden-drift

      # The A2UI golden corpus is append-only (task 012, ADR-18): fail the build
      # if any committed golden document is modified or deleted vs the default
      # branch. Additions are allowed. Runs on the default branch too (empty diff).
      - run: pnpm check:golden-append-only
        env:
          DEFAULT_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}

      # A NUL byte once shipped in a .ts and passed every gate (workshop retro,
      # Stage 4); this rejects control chars (except tab/LF/CR) in tracked source.
      - run: pnpm check:no-control-chars

      - run: pnpm build
