name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (catches newly-published queries against unchanged code).
    - cron: "0 3 * * 1"

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the Security tab
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # security-and-quality adds maintainability/quality queries on top of
          # the default security set — the closest CodeQL gets to SonarQube's
          # code-smell coverage.
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
